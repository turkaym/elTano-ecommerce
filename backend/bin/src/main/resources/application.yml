spring:
  application:
    name: elTano-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eltano_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

app:
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-env}
  mercadopago:
    access-token: ${MP_ACCESS_TOKEN:change-me-in-env}
