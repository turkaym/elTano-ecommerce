spring:
  application:
    name: elTano-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eltano_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

app:
  admin:
    enabled: ${ADMIN_ENABLED:true}
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-env}
  catalog:
    seed-on-empty: ${CATALOG_SEED_ON_EMPTY:true}
    jobs:
      worker:
        enabled: ${CATALOG_JOBS_WORKER_ENABLED:false}
        poll-interval: ${CATALOG_JOBS_WORKER_POLL_INTERVAL:1000ms}
        batch-size: ${CATALOG_JOBS_WORKER_BATCH_SIZE:1}
        max-attempts: ${CATALOG_JOBS_WORKER_MAX_ATTEMPTS:3}
        lease-seconds: ${CATALOG_JOBS_WORKER_LEASE_SECONDS:30}
        concurrency: ${CATALOG_JOBS_WORKER_CONCURRENCY:1}
  uploads:
    product-images:
      directory: ${PRODUCT_IMAGE_UPLOAD_DIR:uploads/product-images}
      public-path: ${PRODUCT_IMAGE_PUBLIC_PATH:/uploads/product-images}
      max-size-bytes: ${PRODUCT_IMAGE_MAX_SIZE_BYTES:5242880}
  mercadopago:
    enabled: ${MP_ENABLED:false}
    api-base-url: ${MP_API_BASE_URL:https://api.mercadopago.com}
    access-token: ${MP_ACCESS_TOKEN:change-me-in-env}
    webhook-secret: ${MP_WEBHOOK_SECRET:change-me-webhook-secret}
    webhook-signature-required: ${MP_WEBHOOK_SIGNATURE_REQUIRED:true}
    webhook-signature-tolerance-seconds: ${MP_WEBHOOK_SIGNATURE_TOLERANCE_SECONDS:300}
    notification-url: ${MP_NOTIFICATION_URL:}
    checkout-success-url: ${MP_CHECKOUT_SUCCESS_URL:http://localhost:5173/checkout/return?result=success}
    checkout-failure-url: ${MP_CHECKOUT_FAILURE_URL:http://localhost:5173/checkout/return?result=failure}
    checkout-pending-url: ${MP_CHECKOUT_PENDING_URL:http://localhost:5173/checkout/return?result=pending}
